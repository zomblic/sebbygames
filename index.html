<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cosmic Word Games</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Keep your cosmic background -->
  <div class="cosmic-bg">
    <div class="nebula"></div>
    <div class="stars" id="starsLayer"></div>
    <div class="twinkle" id="twinkleLayer"></div>
    <div class="shooting-stars"></div>
    <div class="sparkles" id="sparklesLayer">
        <div class="big-stars"></div>
    </div>
  </div>

  <main class="app">
    <header>
      <div class="title">
        <h1>Sebastian Games!</h1>
        <p>Choose a game mode.</p>
      </div>
      <div class="controls">
        <button onclick="location.href='./memory.html'"><img src="./assets/images/memoryIcon.png" alt="Memory Match" title="Memory Match"></button>
        <button onclick="location.href='./decoding.html'"><img src="./assets/images/decodingIcon.png" alt="Syllable Decoding" title="Syllable Decoding"></button>
        <button onclick="location.href='./hangman.html'"><img src="./assets/images/hangmanIcon.png" alt="Hangman" title="Hangman"></button>
        <button onclick="location.href='./badges.html'"><img src="./assets/images/badgesIcon.png" alt="Badges" title="Badges"></button>
      </div>
    </header>

    <section class="boardWrap">
      <div class="toast">
        <div class="msg">Unlock all the badges!</div>
      </div>
    </section>
  </main>
  <script>
  setTimeout(() => {
    unlockBadge("stargazer");
  }, 120000);
</script>
<script src="./badges.js"></script>
  <script src="./decoding.js"></script>
</body>
</html>
